spring:
  application:
    name: flexiwork
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB     # registration uploads several files at once

  thymeleaf:
    cache: false

  mvc:
    hiddenmethod:
      filter:
        enabled: true     # enables HiddenHttpMethodFilter for _method PUT/DELETE in admin forms

resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM:onboarding@resend.dev}

server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
        secure: false           # dev only; overridden to true in application-prod.yml

# ----------------------------------------------------------------------------
# FlexiWork application settings
# ----------------------------------------------------------------------------
flexiwork:
  public-base-url: ${FLEXIWORK_PUBLIC_BASE_URL:http://localhost:8080}

  jwt:
    secret: ${JWT_SECRET:flexiwork-dev-secret-change-me-please-0123456789-abcdefgh}
    expiration-ms: 86400000      # 24h

  uploads:
    dir: uploads

  payment:
    commission-rate: 0.10
    grace-days: 7

  approval:
    auto-window-minutes: 720

  application:
    cancel-cutoff-hours: 2

  support-email: support@flexiwork.lk

  cors:
    allowed-origins: ${FLEXIWORK_CORS_ALLOWED_ORIGINS:http://localhost:5173}

  whatsapp:
    enabled: true
    service-url: ${WHATSAPP_SERVICE_URL:http://localhost:3001}
    shared-secret: ${WHATSAPP_SHARED_SECRET:dev-only-change-me}

  otp:
    length: 6
    ttl-minutes: 5
    max-attempts: 3
    resend-cooldown-seconds: 60

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.flexiwork: INFO

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}